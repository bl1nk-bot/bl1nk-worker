name: CodeQL

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
      - 'requirements.txt'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
      - 'requirements.txt'
  schedule:
    - cron: '0 3 * * 1'

jobs:
  analyze:
    name: Analyze

    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - python
          - actions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
